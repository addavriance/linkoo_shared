name: Publish to GitHub Packages

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Record start time
        id: timer
        run: echo "start=$(date +%s)" >> $GITHUB_OUTPUT

      - name: Notify Telegram — push
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            ${{ github.event.head_commit.author.name }} pushed to branch <a href="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}">${{ github.ref_name }}</a> of <a href="${{ github.server_url }}/${{ github.repository }}">linkoo_shared</a> (<a href="${{ github.event.compare }}">Compare changes</a>)

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@adda'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Publish
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate duration
        id: duration
        if: always()
        run: |
          ELAPSED=$(( $(date +%s) - ${{ steps.timer.outputs.start }} ))
          echo "elapsed=$(printf '%02d:%02d' $((ELAPSED/60)) $((ELAPSED%60)))" >> $GITHUB_OUTPUT

      - name: Notify Telegram — result
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TG_CHAT_ID }}
          token: ${{ secrets.TG_BOT_TOKEN }}
          format: html
          disable_web_page_preview: true
          message: |
            ${{ job.status == 'success' && '✅' || '❌' }} <a href="${{ github.server_url }}/${{ github.repository }}">linkoo_shared</a>: Pipeline <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">#${{ github.run_number }}</a> of branch <a href="${{ github.server_url }}/${{ github.repository }}/tree/${{ github.ref_name }}">${{ github.ref_name }}</a> by ${{ github.event.head_commit.author.name }} (${{ github.actor }}) has ${{ job.status == 'success' && 'passed' || 'failed' }} in ${{ steps.duration.outputs.elapsed }}
